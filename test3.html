<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client-Side Confirmation</title>
</head>
<body>
    <h1 id="test-header">JavaScript Test</h1>
    <p id="time"></p>
    <script>
        // Display the current time (client-side only)
        document.getElementById('time').innerText = 'Current time: ' + new Date().toLocaleTimeString();
    </script>
</body>
</html>
